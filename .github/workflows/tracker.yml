name: BookMyShow Availability Tracker

on:
  schedule:
    # Runs every 30 minutes (GitHub Actions minimum is 5 min, 30 is safer to avoid rate limits)
    - cron: "*/15 * * * *"
  workflow_dispatch:   # Allows you to trigger manually from GitHub UI

jobs:
  check-booking:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4.2.2

      - name: Set up Python
        uses: actions/setup-python@v5.6.0
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Run availability check
        env:
          BMS_URL:       ${{ secrets.BMS_URL }}
          GMAIL_USER:    ${{ secrets.GMAIL_USER }}
          GMAIL_PASS:    ${{ secrets.GMAIL_PASS }}
          NOTIFY_EMAIL:  ${{ secrets.NOTIFY_EMAIL }}
          SCRAPERAPI_KEY:   ${{ secrets.SCRAPERAPI_KEY }}
        run: python check_availability.py
